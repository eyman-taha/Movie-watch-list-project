name: cinewatch
description: "A feature-rich movie discovery and watchlist management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # HTTP Client
  dio: ^5.4.0
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Image Caching
  cached_network_image: ^3.3.1
  
  # Animations
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  
  # URL Launcher
  url_launcher: ^6.2.4
  
  # Connectivity
  connectivity_plus: ^6.0.3
  
  # Shared Preferences
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.3.3
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.18.0
  
  hive: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
